<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="boxGradP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="boxGradG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00b894" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="boxGradO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e17055" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e17055" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00b894"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e17055"/>
    </marker>
  </defs>

  <rect width="800" height="700" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="26" font-weight="700">agent-nexus 架构</text>
  <text x="400" y="64" text-anchor="middle" fill="#a29bfe" font-family="system-ui,sans-serif" font-size="13">AI Message Gateway ← → Coding Agent Runtime</text>

  <g transform="translate(40,80)">
    <rect width="720" height="140" rx="14" fill="url(#boxGradP)" stroke="#6c5ce7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="360" y="28" text-anchor="middle" fill="#a29bfe" font-family="system-ui,sans-serif" font-size="14" font-weight="600">AI 消息网关 / LLM Proxy</text>
    <line x1="40" y1="40" x2="680" y2="40" stroke="#6c5ce7" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 4"/>
    <g transform="translate(20,55)">
      <rect width="140" height="70" rx="10" fill="#6c5ce7" fill-opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">CCX Desktop</text>
      <text x="70" y="42" text-anchor="middle" fill="#ddd" font-family="monospace" font-size="9">127.0.0.1:3688/v1</text>
    </g>
    <g transform="translate(175,55)">
      <rect width="140" height="70" rx="10" fill="#6c5ce7" fill-opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">CC-Switch</text>
      <text x="70" y="42" text-anchor="middle" fill="#ddd" font-family="monospace" font-size="9">127.0.0.1:3688/v1</text>
    </g>
    <g transform="translate(330,55)">
      <rect width="140" height="70" rx="10" fill="#6c5ce7" fill-opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Sensitive Nova</text>
      <text x="70" y="42" text-anchor="middle" fill="#ddd" font-family="monospace" font-size="9">token.sensenova.cn</text>
    </g>
    <g transform="translate(485,55)">
      <rect width="210" height="70" rx="10" fill="#6c5ce7" fill-opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
      <text x="105" y="25" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Custom Proxy</text>
      <text x="105" y="42" text-anchor="middle" fill="#ddd" font-family="monospace" font-size="9">任意 OpenAI 兼容 endpoint</text>
    </g>
  </g>

  <line x1="400" y1="220" x2="400" y2="248" stroke="#00b894" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="415" y="240" fill="#55efc4" font-family="system-ui,sans-serif" font-size="10" font-style="italic">检测代理配置</text>

  <g transform="translate(40,250)">
    <rect width="720" height="100" rx="14" fill="url(#boxGradG)" stroke="#00b894" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="360" y="28" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="14" font-weight="600">agent-nexus 配置层（中间件）</text>
    <line x1="40" y1="40" x2="680" y2="40" stroke="#00b894" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 4"/>
    <g transform="translate(30,55)">
      <circle cx="20" cy="18" r="18" fill="#00b894" fill-opacity="0.3" stroke="#55efc4" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="14" font-weight="700">1</text>
      <text x="45" y="24" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">Discover</text>
      <text x="45" y="38" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">扫描本机 agent</text>
    </g>
    <g transform="translate(195,55)">
      <circle cx="20" cy="18" r="18" fill="#00b894" fill-opacity="0.3" stroke="#55efc4" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="14" font-weight="700">2</text>
      <text x="45" y="24" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">Backup</text>
      <text x="45" y="38" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">创建配置快照</text>
    </g>
    <g transform="translate(360,55)">
      <circle cx="20" cy="18" r="18" fill="#00b894" fill-opacity="0.3" stroke="#55efc4" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="14" font-weight="700">3</text>
      <text x="45" y="24" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">Rewrite</text>
      <text x="45" y="38" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">重写配置文件</text>
    </g>
    <g transform="translate(525,55)">
      <circle cx="20" cy="18" r="18" fill="#00b894" fill-opacity="0.3" stroke="#55efc4" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="14" font-weight="700">4</text>
      <text x="45" y="24" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">Route</text>
      <text x="45" y="38" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">建立模型路由表</text>
    </g>
  </g>

  <line x1="400" y1="350" x2="400" y2="378" stroke="#e17055" stroke-width="2" marker-end="url(#arrowO)"/>
  <text x="415" y="370" fill="#fab1a0" font-family="system-ui,sans-serif" font-size="10" font-style="italic">重写配置指向 Proxy</text>

  <g transform="translate(40,380)">
    <rect width="720" height="290" rx="14" fill="url(#boxGradO)" stroke="#e17055" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="360" y="28" text-anchor="middle" fill="#fab1a0" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Coding Agent 运行时（被配置方）</text>
    <line x1="40" y1="40" x2="680" y2="40" stroke="#e17055" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 4"/>

    <g transform="translate(20,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">codex</text></g>
    <g transform="translate(130,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">claude</text></g>
    <g transform="translate(240,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">kimi</text></g>
    <g transform="translate(350,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">deepseek</text></g>
    <g transform="translate(460,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">opencode</text></g>
    <g transform="translate(570,55)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">openclaw</text></g>

    <g transform="translate(20,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">cursor</text></g>
    <g transform="translate(130,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">codebuddy</text></g>
    <g transform="translate(240,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">hermes</text></g>
    <g transform="translate(350,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">kiro</text></g>
    <g transform="translate(460,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">grok</text></g>
    <g transform="translate(570,95)"><rect width="105" height="32" rx="8" fill="#e17055" fill-opacity="0.25" stroke="#fab1a0" stroke-width="1"/><text x="52.5" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11">qoder/trae</text></g>

    <g transform="translate(0,135)">
      <line x1="72.5" y1="0" x2="72.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="182.5" y1="0" x2="182.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="292.5" y1="0" x2="292.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="402.5" y1="0" x2="402.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="512.5" y1="0" x2="512.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="622.5" y1="0" x2="622.5" y2="40" stroke="#fab1a0" stroke-width="1" stroke-dasharray="3 3"/>
    </g>

    <text x="360" y="200" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">各 agent 独立配置格式（JSON / YAML / TOML / .env），全部被 agent-nexus 重写为指向同一 Proxy</text>

    <g transform="translate(20,218)">
      <text x="0" y="0" fill="#888" font-family="monospace" font-size="9">~/.codex/config.toml</text>
      <text x="0" y="16" fill="#888" font-family="monospace" font-size="9">~/.claude/settings.json</text>
      <text x="0" y="32" fill="#888" font-family="monospace" font-size="9">~/.kimi/config.toml</text>
    </g>
    <g transform="translate(340,218)">
      <text x="0" y="0" fill="#888" font-family="monospace" font-size="9">~/.deepseek/config.toml</text>
      <text x="0" y="16" fill="#888" font-family="monospace" font-size="9">~/.config/opencode/*.jsonc</text>
      <text x="0" y="32" fill="#888" font-family="monospace" font-size="9">~/.openclaude-env</text>
    </g>
  </g>

  <g transform="translate(40,676)">
    <text x="0" y="0" fill="#666" font-family="system-ui,sans-serif" font-size="10" font-weight="500">legend:</text>
    <rect x="55" y="-8" width="12" height="10" rx="2" fill="#6c5ce7" fill-opacity="0.3" stroke="#6c5ce7"/>
    <text x="72" y="0" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">Proxy / 上游</text>
    <rect x="145" y="-8" width="12" height="10" rx="2" fill="#00b894" fill-opacity="0.3" stroke="#00b894"/>
    <text x="162" y="0" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">agent-nexus / 中间件</text>
    <rect x="290" y="-8" width="12" height="10" rx="2" fill="#e17055" fill-opacity="0.3" stroke="#e17055"/>
    <text x="307" y="0" fill="#aaa" font-family="system-ui,sans-serif" font-size="9">Agent / 运行时</text>
  </g>
</svg>