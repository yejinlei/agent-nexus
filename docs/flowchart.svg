<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Phase gradients -->
    <linearGradient id="phase1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e17055" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#e17055" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00b894" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Agent-nexus highlight gradient -->
    <linearGradient id="nexusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdcb6e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fdcb6e" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00b894" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowP" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c5ce7"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e17055"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00b894"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fdcb6e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="750" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="700">
    agent-nexus 工作流全景
  </text>
  <text x="600" y="58" text-anchor="middle" fill="#a29bfe" font-family="system-ui,sans-serif" font-size="14">
    从 Agent 运行时安装 → 自动配置 → 多 Agent 协作平台
  </text>

  <!-- ============================== -->
  <!-- PHASE 1: 安装 Agent 运行时       -->
  <!-- ============================== -->
  <g transform="translate(30,90)">
    <!-- Phase background -->
    <rect width="340" height="600" rx="18" fill="url(#phase1Grad)" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
    <!-- Phase label -->
    <text x="170" y="30" text-anchor="middle" fill="#a29bfe" font-family="system-ui,sans-serif" font-size="16" font-weight="700">① 安装 Agent 运行时</text>

    <!-- Sub-steps -->
    <!-- agent list -->
    <g transform="translate(30,60)">
      <rect width="280" height="70" rx="10" fill="#6c5ce7" fill-opacity="0.15" stroke="#a29bfe" stroke-width="1"/>
      <text x="140" y="28" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="600">$ agent-nexus agent list</text>
      <text x="140" y="46" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">查看可安装的 19 个 agent 运行时</text>
    </g>

    <!-- agent install -->
    <g transform="translate(30,150)">
      <rect width="280" height="100" rx="10" fill="#6c5ce7" fill-opacity="0.20" stroke="#a29bfe" stroke-width="1.5"/>
      <text x="140" y="28" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="600">$ agent-nexus agent install codex</text>
      <text x="140" y="48" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="10">$ agent-nexus agent install --all</text>
      <text x="140" y="70" text-anchor="middle" fill="#6c5ce7" font-family="monospace" font-size="10">npm/pip/下载页/GitHub release 自动选择</text>
    </g>

    <!-- agent uninstall/update -->
    <g transform="translate(30,270)">
      <rect width="280" height="80" rx="10" fill="#6c5ce7" fill-opacity="0.10" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.4"/>
      <text x="140" y="30" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="12">agent-nexus agent uninstall codex</text>
      <text x="140" y="50" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="12">agent-nexus agent update codex</text>
      <text x="140" y="68" text-anchor="middle" fill="#636e72" font-family="monospace" font-size="10">卸载 / 更新 agent 运行时</text>
    </g>

    <!-- installed agents icons -->
    <g transform="translate(30,380)">
      <rect width="280" height="180" rx="10" fill="#6c5ce7" fill-opacity="0.06" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.3"/>
      <text x="140" y="25" text-anchor="middle" fill="#dfe6e9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">已安装的 agent 运行时</text>

      <!-- agent icons in grid -->
      <g transform="translate(20,45)" fill="#6c5ce7" fill-opacity="0.3" stroke="#a29bfe" stroke-width="0.8">
        <rect x="0" y="0" width="60" height="45" rx="6"/>
        <text x="30" y="18" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">codex</text>
        <text x="30" y="33" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">npm</text>

        <rect x="70" y="0" width="60" height="45" rx="6"/>
        <text x="100" y="18" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">claude</text>
        <text x="100" y="33" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">npm</text>

        <rect x="140" y="0" width="60" height="45" rx="6"/>
        <text x="170" y="18" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">kimi</text>
        <text x="170" y="33" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">web</text>

        <rect x="0" y="55" width="60" height="45" rx="6"/>
        <text x="30" y="73" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="8" font-weight="600">opencode</text>
        <text x="30" y="88" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">release</text>

        <rect x="70" y="55" width="60" height="45" rx="6"/>
        <text x="100" y="73" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">cursor</text>
        <text x="100" y="88" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">IDE</text>

        <rect x="140" y="55" width="60" height="45" rx="6"/>
        <text x="170" y="73" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">hermes</text>
        <text x="170" y="88" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">web</text>
      </g>
    </g>
  </g>

  <!-- Arrow 1: Phase 1 → Phase 2 -->
  <path d="M 380 390 L 410 390" stroke="#fdcb6e" stroke-width="3" fill="none" marker-end="url(#arrowY)" opacity="0.8"/>
  <text x="395" y="380" text-anchor="middle" fill="#fdcb6e" font-family="system-ui,sans-serif" font-size="11" font-weight="600">安装完成</text>

  <!-- ============================== -->
  <!-- PHASE 2: agent-nexus 自动配置   -->
  <!-- ============================== -->
  <g transform="translate(430,90)">
    <!-- Phase background -->
    <rect width="340" height="600" rx="18" fill="url(#phase2Grad)" stroke="#e17055" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
    <!-- Phase label -->
    <text x="170" y="30" text-anchor="middle" fill="#fab1a0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">② agent-nexus 自动配置</text>

    <!-- Step 1: discover -->
    <g transform="translate(20,55)">
      <rect width="300" height="60" rx="10" fill="#e17055" fill-opacity="0.18" stroke="#fab1a0" stroke-width="1.2"/>
      <text x="150" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="600">$ agent-nexus agent discover</text>
      <text x="150" y="43" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">扫描本机已安装的 agent 及配置状态</text>
    </g>

    <!-- Step 2: proxy detect -->
    <g transform="translate(20,130)">
      <rect width="300" height="60" rx="10" fill="#e17055" fill-opacity="0.18" stroke="#fab1a0" stroke-width="1.2"/>
      <text x="150" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="600">$ agent-nexus proxy detect</text>
      <text x="150" y="43" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">自动检测 CCX Desktop / CC-Switch / 自定义代理</text>
    </g>

    <!-- Step 3: proxy sniff + db add -->
    <g transform="translate(20,205)">
      <rect width="300" height="75" rx="10" fill="#e17055" fill-opacity="0.18" stroke="#fab1a0" stroke-width="1.2"/>
      <text x="150" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="600">$ agent-nexus proxy sniff</text>
      <text x="150" y="43" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">嗅探 LLM 提供商 → 保存至 SQLite 数据库</text>
      <text x="150" y="60" text-anchor="middle" fill="#e17055" font-family="monospace" font-size="10">proxy db add · list · query · rm</text>
    </g>

    <!-- Step 4: conf bak (main command) -->
    <g transform="translate(20,300)">
      <rect width="300" height="100" rx="10" fill="url(#nexusGrad)" stroke="#fdcb6e" stroke-width="2" filter="url(#glow)"/>
      <text x="150" y="28" text-anchor="middle" fill="#2d3436" font-family="monospace" font-size="14" font-weight="700">$ agent-nexus conf bak</text>
      <text x="150" y="48" text-anchor="middle" fill="#2d3436" font-family="monospace" font-size="11">扫描 agent → 备份 → 配置代理 → 模型路由</text>
      <text x="150" y="68" text-anchor="middle" fill="#fdcb6e" font-family="system-ui,sans-serif" font-size="11" font-weight="600">★ 一键完成所有配置 ★</text>
    </g>

    <!-- Version management -->
    <g transform="translate(20,420)">
      <rect width="300" height="120" rx="10" fill="#e17055" fill-opacity="0.08" stroke="#e17055" stroke-width="1" stroke-opacity="0.3"/>
      <text x="150" y="22" text-anchor="middle" fill="#dfe6e9" font-family="system-ui,sans-serif" font-size="11" font-weight="600">配置版本化管理</text>
      <text x="150" y="42" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">conf history   查看快照历史</text>
      <text x="150" y="60" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">conf rollback  回滚到指定快照</text>
      <text x="150" y="78" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">conf branch    管理配置分支</text>
      <text x="150" y="100" text-anchor="middle" fill="#636e72" font-family="monospace" font-size="10">类似 git 的配置快照 / 回滚 / 分支</text>
    </g>
  </g>

  <!-- Arrow 2: Phase 2 → Phase 3 -->
  <path d="M 780 390 L 810 390" stroke="#fdcb6e" stroke-width="3" fill="none" marker-end="url(#arrowY)" opacity="0.8"/>
  <text x="795" y="380" text-anchor="middle" fill="#fdcb6e" font-family="system-ui,sans-serif" font-size="11" font-weight="600">配置就绪</text>

  <!-- ============================== -->
  <!-- PHASE 3: 多 Agent 协作平台       -->
  <!-- ============================== -->
  <g transform="translate(870,90)">
    <!-- Phase background -->
    <rect width="300" height="600" rx="18" fill="url(#phase3Grad)" stroke="#00b894" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
    <!-- Phase label -->
    <text x="150" y="30" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="16" font-weight="700">③ 多 Agent 协作平台</text>

    <!-- Multica -->
    <g transform="translate(15,55)">
      <rect width="270" height="100" rx="12" fill="#00b894" fill-opacity="0.15" stroke="#55efc4" stroke-width="1.2"/>
      <text x="135" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Multica</text>
      <text x="135" y="52" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">团队协作工作区</text>
      <text x="135" y="70" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">→ 使用已配置的 agent</text>
      <text x="135" y="88" text-anchor="middle" fill="#636e72" font-family="monospace" font-size="10">coding / coding-agent / multica-chat</text>
    </g>

    <!-- Orca -->
    <g transform="translate(15,170)">
      <rect width="270" height="100" rx="12" fill="#00b894" fill-opacity="0.15" stroke="#55efc4" stroke-width="1.2"/>
      <text x="135" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Orca</text>
      <text x="135" y="52" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">智能客服 / 工作流</text>
      <text x="135" y="70" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="11">→ 复用已配置的 agent</text>
      <text x="135" y="88" text-anchor="middle" fill="#636e72" font-family="monospace" font-size="10">客服 / 销售 / 运营自动化</text>
    </g>

    <!-- Other platforms -->
    <g transform="translate(15,285)">
      <rect width="270" height="110" rx="12" fill="#00b894" fill-opacity="0.10" stroke="#00b894" stroke-width="1" stroke-opacity="0.3"/>
      <text x="135" y="22" text-anchor="middle" fill="#dfe6e9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">其他协作平台</text>

      <g transform="translate(0,30)">
        <rect width="80" height="60" rx="8" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="0.8"/>
        <text x="40" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">cursor</text>
        <text x="40" y="42" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">IDE</text>

        <rect x="90" y="0" width="80" height="60" rx="8" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="0.8"/>
        <text x="130" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="8" font-weight="600">deepseek</text>
        <text x="130" y="42" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">CLI</text>

        <rect x="180" y="0" width="80" height="60" rx="8" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="0.8"/>
        <text x="220" y="25" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="600">kimi</text>
        <text x="220" y="42" text-anchor="middle" fill="#b2bec3" font-family="monospace" font-size="8">web</text>
      </g>
    </g>

    <!-- Benefit -->
    <g transform="translate(15,420)">
      <rect width="270" height="155" rx="10" fill="#00b894" fill-opacity="0.06" stroke="#00b894" stroke-width="1" stroke-opacity="0.3"/>
      <text x="135" y="22" text-anchor="middle" fill="#55efc4" font-family="system-ui,sans-serif" font-size="12" font-weight="700">✨ 核心收益</text>
      <text x="135" y="46" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">一次配置，所有平台共享</text>
      <text x="135" y="66" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">代理/模型/Key 统一管理</text>
      <text x="135" y="86" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">配置快照，随时回滚</text>
      <text x="135" y="106" text-anchor="middle" fill="#dfe6e9" font-family="monospace" font-size="11">换代理？改一个 upstream</text>
    </g>
  </g>

  <!-- ============================== -->
  <!-- Central label: agent-nexus    -->
  <!-- ============================== -->
  <g transform="translate(535,420)">
    <rect width="130" height="44" rx="22" fill="#fdcb6e" fill-opacity="0.15" stroke="#fdcb6e" stroke-width="2" filter="url(#glow)"/>
    <text x="65" y="20" text-anchor="middle" fill="#fdcb6e" font-family="system-ui,sans-serif" font-size="12" font-weight="700">agent-nexus</text>
    <text x="65" y="36" text-anchor="middle" fill="#fdcb6e" font-family="system-ui,sans-serif" font-size="9">中间件 / 配置中枢</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(30,710)">
    <text x="0" y="0" fill="#636e72" font-family="system-ui,sans-serif" font-size="10">
      ① 安装运行时 → ② agent-nexus 自动配置（扫描/检测/备份/配置/路由）→ ③ 多 Agent 协作平台复用配置
    </text>
  </g>

</svg>
